<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCampus | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* BASE PREMIUM STYLES */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #09090b; /* Very dark slate, not pure black */
            color: #f4f4f5; 
            margin: 0; 
            padding: 40px; 
            display: flex; 
            gap: 40px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1, h2 { margin-top: 0; font-weight: 800; letter-spacing: -0.5px; }
        h1 { font-size: 28px; color: #ffffff; margin-bottom: 5px; }
        h2 { font-size: 20px; color: #ffffff; margin-bottom: 10px; }
        
        .subtitle { color: #a1a1aa; font-size: 14px; margin-bottom: 30px; font-weight: 400; }
        .divider { height: 1px; background: #27272a; margin-bottom: 30px; width: 100%; }

        /* LAYOUT */
        .col-left { flex: 2; }
        .col-right { 
            flex: 1; 
            background: #18181b; 
            padding: 32px; 
            border: 1px solid #27272a;
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            height: fit-content;
        }

        /* PREMIUM ALERT CARDS */
        .alert-card { 
            background: #18181b; 
            border: 1px solid #27272a; 
            padding: 24px; 
            margin-bottom: 24px; 
            border-radius: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        /* The "Live Lockdown" Card Style */
        .alert-card.live-threat {
            border-color: #e11d48;
            background: linear-gradient(180deg, rgba(225, 29, 72, 0.08) 0%, rgba(24, 24, 27, 1) 100%);
            box-shadow: 0 8px 32px rgba(225, 29, 72, 0.15);
            animation: softPulse 2s infinite;
        }

        .alert-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .student-name { font-size: 20px; font-weight: 800; color: #ffffff; }
        .student-id { font-size: 13px; color: #71717a; font-weight: 600; margin-top: 4px; display: block; }
        
        .status-badge { 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 800; 
            letter-spacing: 0.5px; 
        }
        .badge-pending { background: rgba(250, 204, 21, 0.1); color: #facc15; border: 1px solid rgba(250, 204, 21, 0.2); }
        .badge-live { background: rgba(225, 29, 72, 0.1); color: #e11d48; border: 1px solid rgba(225, 29, 72, 0.2); }

        .tactical-data { margin-bottom: 24px; background: #09090b; padding: 16px; border-radius: 12px; border: 1px solid #27272a; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .data-row:last-child { margin-bottom: 0; }
        .data-label { color: #a1a1aa; font-weight: 600; }
        .data-value { color: #f4f4f5; font-weight: 400; }
        
        .maps-link { color: #38bdf8; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .maps-link:hover { color: #7dd3fc; text-decoration: underline; }

        /* MODERN BUTTONS */
        .btn-container { display: flex; gap: 12px; }
        button { 
            padding: 14px 24px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 14px;
            cursor: pointer; 
            font-family: 'Inter', sans-serif;
            flex: 1; 
            transition: all 0.2s ease; 
        }
        
        .btn-broadcast { background: #e11d48; color: white; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3); }
        .btn-broadcast:hover { background: #be123c; transform: translateY(-1px); }
        
        .btn-resolve { background: #27272a; color: #f4f4f5; border: 1px solid #3f3f46; }
        .btn-resolve:hover { background: #3f3f46; }

        /* ZONE MANAGER INPUTS */
        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 12px; font-weight: 600; color: #a1a1aa; margin-bottom: 8px; }
        .zone-input { 
            width: 100%; padding: 14px; border-radius: 10px; 
            border: 1px solid #27272a; background: #09090b; 
            color: #f4f4f5; font-family: 'Inter', sans-serif; box-sizing: border-box;
            transition: border-color 0.2s ease;
        }
        .zone-input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }
        
        .btn-add-zone { background: #f4f4f5; color: #09090b; width: 100%; margin-top: 8px; }
        .btn-add-zone:hover { background: #e4e4e7; }
        
        /* ZONE LIST */
        .zone-list { list-style-type: none; padding: 0; margin-top: 32px; }
        .zone-item { 
            background: #09090b; padding: 16px; margin-bottom: 12px; 
            border-radius: 12px; border: 1px solid #27272a; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .zone-name { font-weight: 600; color: #f4f4f5; font-size: 14px; }
        .zone-coords { font-size: 12px; color: #71717a; margin-top: 4px; font-family: monospace; }
        .btn-delete { background: transparent; color: #ef4444; border: none; padding: 8px; font-size: 13px; font-weight: 600; flex: none; width: auto; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.1); }

        /* SMOOTH PULSE FOR LIVE THREATS */
        @keyframes softPulse {
            0% { box-shadow: 0 8px 32px rgba(225, 29, 72, 0.1); }
            50% { box-shadow: 0 8px 40px rgba(225, 29, 72, 0.3); }
            100% { box-shadow: 0 8px 32px rgba(225, 29, 72, 0.1); }
        }
    </style>
</head>
<body>

    <div class="col-left">
        <h1>Overview</h1>
        <div class="subtitle">Real-time emergency telemetry and active alerts.</div>
        <div class="divider"></div>
        
        <div id="alerts-container">
            <div id="empty-state" style="text-align: center; color: #71717a; margin-top: 80px; font-size: 15px;">
                <span style="font-size: 40px; display: block; margin-bottom: 15px;">🛡️</span>
                System is monitoring. No active alerts.
            </div>
        </div>
    </div>

    <div class="col-right">
        <h2>Rally Points</h2>
        <div class="subtitle" style="margin-bottom: 24px;">Manage dynamic evacuation zones. Updates sync to all devices instantly.</div>
        
        <div class="input-group">
            <label class="input-label">ZONE NAME</label>
            <input type="text" id="z-name" class="zone-input" placeholder="e.g. North Football Field">
        </div>
        <div class="input-group" style="display: flex; gap: 12px;">
            <div style="flex: 1;">
                <label class="input-label">LATITUDE</label>
                <input type="number" id="z-lat" class="zone-input" placeholder="13.0827">
            </div>
            <div style="flex: 1;">
                <label class="input-label">LONGITUDE</label>
                <input type="number" id="z-lng" class="zone-input" placeholder="80.2707">
            </div>
        </div>
        <button class="btn-add-zone" onclick="addSafeZone()">Add Rally Point</button>

        <ul class="zone-list" id="zone-list-container">
            </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgkGQTLeSPQAXENul5Iw1ovNIK8PojakA",
            authDomain: "school-safe-alert.firebaseapp.com",
            databaseURL: "https://school-safe-alert-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "school-safe-alert",
            storageBucket: "school-safe-alert.appspot.com",
            messagingSenderId: "464672366786",
            appId: "1:464672366786:web:d4c6b4e59923be2ec5db5b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // 1. SAFE ZONE MANAGER LOGIC
        const zonesRef = ref(db, 'config/rallyPoints');
        const zoneListContainer = document.getElementById('zone-list-container');

        onValue(zonesRef, (snapshot) => {
            zoneListContainer.innerHTML = ''; 
            const data = snapshot.val();
            if (data) {
                Object.entries(data).forEach(([key, zone]) => {
                    const li = document.createElement('li');
                    li.className = 'zone-item';
                    li.innerHTML = `
                        <div>
                            <div class="zone-name">${zone.name}</div>
                            <div class="zone-coords">${zone.lat}, ${zone.lng}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteZone('${key}')">Remove</button>
                    `;
                    zoneListContainer.appendChild(li);
                });
            } else {
                zoneListContainer.innerHTML = '<li style="color: #71717a; font-size: 13px; text-align: center; padding: 20px;">No rally points configured.</li>';
            }
        });

        window.addSafeZone = function() {
            const name = document.getElementById('z-name').value;
            const lat = parseFloat(document.getElementById('z-lat').value);
            const lng = parseFloat(document.getElementById('z-lng').value);
            if (!name || isNaN(lat) || isNaN(lng)) { alert("Please check your coordinate formatting."); return; }
            push(zonesRef, { name: name, lat: lat, lng: lng }).then(() => {
                document.getElementById('z-name').value = ''; document.getElementById('z-lat').value = ''; document.getElementById('z-lng').value = '';
            });
        };

        window.deleteZone = function(key) { remove(ref(db, `config/rallyPoints/${key}`)); };

        // 2. EMERGENCY ALERT LOGIC
        const alertsRef = ref(db, 'alerts');
        const container = document.getElementById('alerts-container');

        onValue(alertsRef, (snapshot) => {
            const data = snapshot.val();
            container.innerHTML = ''; 

            if (data) {
                const activeAlerts = Object.entries(data).filter(([key, val]) => val.status === 'pending' || val.status === 'broadcasted');
                
                if (activeAlerts.length === 0) {
                    container.innerHTML = '<div id="empty-state" style="text-align: center; color: #71717a; margin-top: 80px; font-size: 15px;"><span style="font-size: 40px; display: block; margin-bottom: 15px;">🛡️</span>System is monitoring. No active alerts.</div>';
                    return;
                }

                activeAlerts.forEach(([key, alert]) => {
                    const mapsUrl = `http://maps.google.com/maps?q=${alert.coords.latitude},${alert.coords.longitude}`;
                    const timeString = alert.timestamp ? new Date(alert.timestamp).toLocaleTimeString() : 'Just now';
                    const sender = alert.senderName || "Unknown User";
                    const isLive = alert.status === 'broadcasted';
                    
                    const cardClass = isLive ? "alert-card live-threat" : "alert-card";
                    const badgeClass = isLive ? "status-badge badge-live" : "status-badge badge-pending";
                    const statusText = isLive ? "ACTIVE LOCKDOWN" : "PENDING VERIFICATION";

                    const card = document.createElement('div');
                    card.className = cardClass;
                    card.innerHTML = `
                        <div class="alert-header">
                            <div>
                                <span class="student-name">${sender}</span>
                                <span class="student-id">Signal triggered at ${timeString}</span>
                            </div>
                            <div class="${badgeClass}">${statusText}</div>
                        </div>
                        
                        <div class="tactical-data">
                            <div class="data-row">
                                <span class="data-label">Coordinates</span>
                                <span class="data-value" style="font-family: monospace;">${alert.coords.latitude.toFixed(5)}, ${alert.coords.longitude.toFixed(5)}</span>
                            </div>
                            <div class="data-row" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #27272a;">
                                <span class="data-label">Live Map</span>
                                <a href="${mapsUrl}" target="_blank" class="maps-link">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    View in Google Maps
                                </a>
                            </div>
                        </div>

                        <div class="btn-container">
                            <button class="btn-resolve" onclick="updateStatus('${key}', 'resolved')">Clear Alert</button>
                            ${!isLive ? `<button class="btn-broadcast" onclick="updateStatus('${key}', 'broadcasted')">Broadcast Lockdown</button>` : ''}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<div id="empty-state" style="text-align: center; color: #71717a; margin-top: 80px; font-size: 15px;"><span style="font-size: 40px; display: block; margin-bottom: 15px;">🛡️</span>System is monitoring. No active alerts.</div>';
            }
        });

        window.updateStatus = function(alertId, newStatus) {
            if(newStatus === 'broadcasted' && !confirm("Warning: This will trigger the Scatter Protocol on all active devices. Proceed?")) return;
            const updates = {};
            updates['/alerts/' + alertId + '/status'] = newStatus;
            update(ref(db), updates);
        };
    </script>
</body>
</html>
